services:
  - type: web
    name: swingmaster-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: false
    rootDir: backend

  - type: web
    name: swingmaster-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: swingmaster-backend
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: false
    rootDir: frontend
